<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Party</title>
<style>
body {
    background: #000;
    color: #999;
    font-family: "Courier New", monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    user-select: none;
    overflow: hidden;
    cursor: none;
}
#text {
    font-size: 1.3rem;
    letter-spacing: 2px;
    white-space: pre;
}
.trail {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #999;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s, transform 0.1s;
}
#sadface {
    position: fixed;
    bottom: 10px;
    left: 10px;
    color: #999;
    cursor: pointer;
    font-size: 1.4rem;
    transition: color 0.2s;
}
#sadface:hover { color: #fff; }
</style>
</head>
<body>

<div id="text"></div>
<div id="sadface">:(</div>

<audio id="bgmusic" loop>
    <source src="Volare.mp3" type="audio/mpeg">
</audio>

<script>
// ---------------------- Typing Effect ----------------------
const msg = "we never condoned violence";
const display = document.getElementById("text");
let idx = 0;

function startTyping() {
    if (idx < msg.length) {
        display.textContent += msg[idx];
        idx++;
        setTimeout(startTyping, 100);
    }
}
startTyping();

// ---------------------- Play Music on First Click ----------------------
document.addEventListener("mousedown", () => {
    const music = document.getElementById("bgmusic");
    music.play().catch(() => {
        console.warn("Autoplay blocked");
    });
}, { once: true });

// ---------------------- Cursor Trail ----------------------
const dots = [];
const trailCount = 15;
for (let i = 0; i < trailCount; i++) {
    const dot = document.createElement("div");
    dot.className = "trail";
    document.body.appendChild(dot);
    dots.push(dot);
}
let currentDot = 0;
document.addEventListener("mousemove", e => {
    const dot = dots[currentDot];
    dot.style.left = `${e.pageX - 2}px`;
    dot.style.top = `${e.pageY - 2}px`;
    dot.style.opacity = 1;
    dot.style.transform = "scale(1)";
    setTimeout(() => { dot.style.opacity = 0; dot.style.transform = "scale(0.5)"; }, 300);
    currentDot = (currentDot + 1) % trailCount;
});
