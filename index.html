<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Party</title>
<style>
body{
    background:#000;
    color:#999;
    font-family:"Courier New", monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    user-select:none;
    overflow:hidden;
    cursor:none;
}
#text{
    font-size:1.3rem;
    letter-spacing:2px;
    white-space:pre;
    position:relative;
}
/* subtle cursor trail */
.trail{
    position:absolute;
    width:3px;
    height:3px;
    background:#999;
    border-radius:50%;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.2s;
}

/* clickable sad face */
#sadface{
    position:fixed;
    bottom:10px;
    left:10px;
    color:#999;
    font-family:"Courier New", monospace;
    cursor:pointer;
    font-size:1.2rem;
    user-select:none;
    transition:color 0.2s;
}
#sadface:hover{
    color:#fff;
}
</style>
</head>
<body>
<div id="text">\u200B</div>
<div id="sadface">:(</div>

<audio id="bgmusic" loop>
<source src="Volare.mp3" type="audio/mpeg">
</audio>

<script>
// typewriter effect
const message="we never condoned violence";
const text=document.getElementById("text");
text.textContent="\u200B"; 
let i=0;
function type(){
    if(i<message.length){
        text.textContent+=message[i];
        i++;
        setTimeout(type, 80 + Math.random()*40);
    }
}
type();

// background audio
const audio = document.getElementById("bgmusic");
function startAudio(){ 
    audio.play(); 
    document.removeEventListener("mousemove", startAudio); 
    document.removeEventListener("click", startAudio);
}
document.addEventListener("mousemove", startAudio);
document.addEventListener("click", startAudio);

// minimal cursor trail
const trail = [];
const trailLength = 25;
for(let j=0; j<trailLength; j++){
    const dot = document.createElement("div");
    dot.className = "trail";
    document.body.appendChild(dot);
    trail.push(dot);
}
let t=0;
document.addEventListener("mousemove", e=>{
    const dot = trail[t];
    dot.style.left = (e.pageX - 1.5) + "px";
    dot.style.top = (e.pageY - 1.5) + "px";
    dot.style.opacity = 1;
    setTimeout(()=>{ dot.style.opacity = 0; }, 300);
    t = (t+1) % trailLength;
});

// disable right-click / selection
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("selectstart", e=>e.preventDefault());

// sad face click
const sadface = document.getElementById("sadface");
sadface.addEventListener("click", () => {
    window.open("https://t.me/publicpartys", "_blank");
});
</script>
</body>
</html>
