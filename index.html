<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>privateparty</title>

<style>

body{
background:#000;
color:#9a9a9a;
font-family:"Courier New", monospace;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
cursor:none;
user-select:none;
}

/* vignette */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
box-shadow:inset 0 0 220px #000;
}

/* text */

#text{
font-size:1.5rem;
letter-spacing:3px;
opacity:0;
animation:fadecycle 8s infinite;
}

@keyframes fadecycle{
0%{opacity:0}
25%{opacity:1}
75%{opacity:1}
100%{opacity:0}
}

/* cursor trail */

.trail{
position:absolute;
width:5px;
height:5px;
background:#aaa;
border-radius:50%;
pointer-events:none;
opacity:0;
transform:translate(-50%,-50%);
transition:opacity .4s;
}

/* sad link */

#sad{
position:fixed;
bottom:10px;
left:12px;
color:#777;
font-size:1.2rem;
cursor:pointer;
transition:.2s;
}

#sad:hover{
color:#fff;
}

</style>
</head>

<body>

<div id="text">we never condoned violence</div>
<div id="sad">:(</div>

<audio id="music" autoplay loop>
<source src="Volare.mp3" type="audio/mpeg">
</audio>

<script>

/* start music immediately */

window.addEventListener("load",()=>{
const music=document.getElementById("music");
music.volume=0.8;

music.play().catch(()=>{
/* some browsers block autoplay */
});
});

/* improved cursor trail */

const trail=[];
const trailLength=35;

for(let i=0;i<trailLength;i++){

const dot=document.createElement("div");
dot.className="trail";

document.body.appendChild(dot);
trail.push(dot);

}

let mouseX=0;
let mouseY=0;

document.addEventListener("mousemove",e=>{
mouseX=e.pageX;
mouseY=e.pageY;
});

let positions=[];

for(let i=0;i<trailLength;i++){
positions.push({x:0,y:0});
}

function animateTrail(){

positions.unshift({x:mouseX,y:mouseY});
positions.pop();

for(let i=0;i<trail.length;i++){

let p=positions[i];

trail[i].style.left=p.x+"px";
trail[i].style.top=p.y+"px";

trail[i].style.opacity=(1-(i/trailLength));

trail[i].style.transform=`translate(-50%,-50%) scale(${1-(i/trailLength)*0.7})`;

}

requestAnimationFrame(animateTrail);

}

animateTrail();

/* disable right click */

document.addEventListener("contextmenu",e=>e.preventDefault());

/* telegram link */

document.getElementById("sad").onclick=()=>{
window.open("https://t.me/publicpartys","_blank");
};

</script>

</body>
</html>
