<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>privateparty</title>

<style>
body{
background:#000;
color:#9a9a9a;
font-family:"Courier New", monospace;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
cursor:none;
user-select:none;
}

/* vignette */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
box-shadow:inset 0 0 220px #000;
}

/* main text */
#text{
font-size:1.5rem;
letter-spacing:3px;
opacity:0;
animation:fadecycle 8s infinite;
}

@keyframes fadecycle{
0%{opacity:0}
25%{opacity:1}
75%{opacity:1}
100%{opacity:0}
}

/* sad link */
#sad{
position:fixed;
bottom:10px;
left:12px;
color:#777;
font-size:1.2rem;
cursor:pointer;
transition:.2s;
}

#sad:hover{
color:#fff;
}
</style>
</head>

<body>

<div id="text">we never condoned violence</div>
<div id="sad">:(</div>

<audio id="music" autoplay loop>
<source src="Volare.mp3" type="audio/mpeg">
</audio>

<script>
// ===================
// MUSIC
// ===================
window.addEventListener("load",()=>{
const music=document.getElementById("music");
music.volume=0.8;
music.play().catch(()=>{});
});

// ===================
// CURSOR TRAIL - NEXT LEVEL
// ===================

// parameters
const trailLength = 40;
const trailSpacing = 0.18; // smoothing factor
const trailColor = "#aaa";

// trail elements
let trail = [];
for(let i=0;i<trailLength;i++){
    const div = document.createElement("div");
    div.style.position="absolute";
    div.style.width="8px";
    div.style.height="8px";
    div.style.borderRadius="50%";
    div.style.pointerEvents="none";
    div.style.background=trailColor;
    div.style.opacity = 0;
    div.style.transform = "translate(-50%, -50%) scale(1)";
    document.body.appendChild(div);
    trail.push(div);
}

// store positions
let positions = Array(trailLength).fill({x:window.innerWidth/2, y:window.innerHeight/2});
let mouse = {x:window.innerWidth/2, y:window.innerHeight/2};

document.addEventListener("mousemove",(e)=>{
    mouse.x = e.pageX;
    mouse.y = e.pageY;
});

// animate trail
function animateTrail(){
    // move first point toward mouse
    positions[0] = {
        x: positions[0].x + (mouse.x - positions[0].x)*trailSpacing,
        y: positions[0].y + (mouse.y - positions[0].y)*trailSpacing
    };

    // each segment follows previous
    for(let i=1;i<trailLength;i++){
        positions[i] = {
            x: positions[i].x + (positions[i-1].x - positions[i].x)*trailSpacing,
            y: positions[i].y + (positions[i-1].y - positions[i].y)*trailSpacing
        };
    }

    // render
    for(let i=0;i<trailLength;i++){
        const p = positions[i];
        const t = trail[i];
        t.style.left = p.x+"px";
        t.style.top = p.y+"px";
        t.style.opacity = 1 - (i/trailLength); // fade tail
        t.style.transform = `translate(-50%,-50%) scale(${1-(i/trailLength)*0.7})`;
    }

    requestAnimationFrame(animateTrail);
}

animateTrail();

// ===================
// DISABLE RIGHT CLICK
// ===================
document.addEventListener("contextmenu",e=>e.preventDefault());

// ===================
// TELEGRAM LINK
// ===================
document.getElementById("sad").onclick=()=>{
window.open("https://t.me/publicpartys","_blank");
};
</script>

</body>
</html>
