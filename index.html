<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>.</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
background:#000;
color:#5a5a5a;
font-family:monospace;
height:100vh;
overflow:hidden;
display:flex;
align-items:flex-start;
justify-content:center;
cursor:none;
padding-top:40vh;
}

#text{
font-size:1.1rem;
letter-spacing:4px;
opacity:.8;
position:relative;
transition:transform .2s;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.85) 100%);
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 4px
);
opacity:.25;
}

.trail{
position:absolute;
width:2px;
height:2px;
background:#9a9a9a;
pointer-events:none;
opacity:.8;
}

.flicker{
animation:flicker .12s linear;
}

@keyframes flicker{
0%{opacity:.9}
50%{opacity:.2}
100%{opacity:.9}
}

</style>
</head>

<body>

<div id="text"></div>

<audio autoplay loop>
<source src="vile.mp3" type="audio/mpeg">
</audio>

<script>

const message="we never condoned violence"
const text=document.getElementById("text")
let i=0

function type(){
if(i<message.length){
text.textContent+=message[i]
i++
setTimeout(type,80+Math.random()*40)
}
}

type()

setInterval(()=>{
document.body.classList.add("flicker")
setTimeout(()=>document.body.classList.remove("flicker"),80)
},4000+Math.random()*5000)

const trail=[]
const length=60

for(let i=0;i<length;i++){
let d=document.createElement("div")
d.className="trail"
document.body.appendChild(d)
trail.push(d)
}

let t=0

document.addEventListener("mousemove",e=>{

let dot=trail[t]

dot.style.left=e.pageX+"px"
dot.style.top=e.pageY+"px"
dot.style.opacity=1

setTimeout(()=>{
dot.style.opacity=0
},400)

t=(t+1)%length

let rect=text.getBoundingClientRect()
let dx=e.clientX-(rect.left+rect.width/2)
let dy=e.clientY-(rect.top+rect.height/2)
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<200){
text.style.transform=`translate(${dx*0.03}px,${dy*0.03}px)`
}else{
text.style.transform="translate(0,0)"
}

})

document.addEventListener("contextmenu",e=>e.preventDefault())
document.addEventListener("selectstart",e=>e.preventDefault())

function jitter(){
text.style.transform=`translate(${Math.random()*2-1}px,${Math.random()*2-1}px)`
setTimeout(()=>text.style.transform="translate(0,0)",120)
}

setInterval(jitter,3000+Math.random()*4000)

</script>

</body>
</html>
